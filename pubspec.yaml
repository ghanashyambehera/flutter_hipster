name: meeting_app
description: "Flutter 1:1 real-time video calling (Amazon Chime SDK)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1
  bloc: ^9.0.1
  equatable: ^2.0.7

  # Models / immutability
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Networking
  dio: ^5.9.0

  # Dependency injection
  get_it: ^8.2.0

  # Functional error handling
  dartz: ^0.10.1

  # Platform / utilities
  permission_handler: ^12.0.1
  intl: ^0.20.2
  share_plus: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.9.0
  freezed: ^3.2.3
  json_serializable: ^6.11.1

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
